<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Speed Swipe Attendance - Edit Event</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#6750A4",
                        "on-primary": "#FFFFFF",
                        "primary-container": "#EADDFF",
                        "on-primary-container": "#21005D",
                        "surface": "#FEF7FF",
                        "on-surface": "#1D1B20",
                        "on-surface-variant": "#49454F",
                        "surface-container": "#F3EDF7",
                        "surface-container-high": "#ECE6F0",
                        "secondary-container": "#E8DEF8",
                        "on-secondary-container": "#1D192B",
                        "tertiary-container": "#FFD8E4",
                        "on-tertiary-container": "#31111D",
                        "error": "#B3261E",
                        "on-error": "#FFFFFF"
                    },
                    fontFamily: {
                        "sans": ["IBM Plex Sans", "sans-serif"],
                    },
                    boxShadow: {
                        "elevation-1": "0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3)",
                        "elevation-2": "0px 2px 6px 2px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3)",
                        "elevation-3": "0px 4px 8px 3px rgba(0, 0, 0, 0.15), 0px 1px 3px 0px rgba(0, 0, 0, 0.3)",
                    },
                    borderRadius: {
                        "card": "16px",
                        "pill": "28px",
                        "extra-large": "28px"
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-sans antialiased text-on-surface min-h-screen flex flex-col relative selection:bg-primary selection:text-on-primary">
<header class="pt-12 px-4 pb-4 bg-surface sticky top-0 z-10 flex items-center gap-4">
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container transition-colors active:scale-95 text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-[22px] font-normal text-on-surface leading-tight">Edit Event</h1>
</header>
<main class="flex-1 px-6 pt-6 pb-28 flex flex-col gap-8">
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1">Event Name</label>
<div class="relative">
<input class="w-full h-14 bg-tertiary-container text-on-tertiary-container rounded-t-[4px] border-b border-on-surface-variant/50 focus:border-primary focus:ring-0 px-4 pt-1 text-base font-normal placeholder:text-on-surface-variant/70 transition-colors" type="text" value="Morning Service"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1">Event Time</label>
<div class="relative group">
<input class="w-full h-14 bg-tertiary-container text-on-tertiary-container rounded-t-[4px] border-b border-on-surface-variant/50 focus:border-primary focus:ring-0 px-4 pt-1 text-base font-normal placeholder:text-on-surface-variant/70 transition-colors" type="text" value="10:00 AM"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">schedule</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1">Frequency</label>
<div class="relative">
<select class="w-full h-14 bg-tertiary-container text-on-tertiary-container rounded-t-[4px] border-b border-on-surface-variant/50 focus:border-primary focus:ring-0 px-4 pt-1 text-base font-normal appearance-none transition-colors">
<option>One-time</option>
<option selected="">Weekly</option>
<option>Bi-weekly</option>
<option>Monthly</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">arrow_drop_down</span>
</div>
<p class="text-xs text-on-surface-variant ml-4 pt-1">How often this event repeats.</p>
</div>
</form>
</main>
<div class="fixed bottom-0 left-0 right-0 p-4 pb-8 bg-surface border-t border-on-surface-variant/10 z-20">
<button class="w-full h-[52px] rounded-full bg-primary text-on-primary text-base font-medium tracking-wide shadow-elevation-1 active:shadow-none active:scale-[0.99] transition-all flex items-center justify-center">
            Save Changes
        </button>
</div>

</body></html>
