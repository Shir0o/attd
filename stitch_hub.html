<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Speed Swipe Attendance - The Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#6750A4",
                        "on-primary": "#FFFFFF",
                        "primary-container": "#EADDFF",
                        "on-primary-container": "#21005D",
                        "surface": "#FEF7FF",
                        "on-surface": "#1D1B20",
                        "on-surface-variant": "#49454F",
                        "surface-container": "#F3EDF7",
                        "surface-container-high": "#ECE6F0",
                        "secondary-container": "#E8DEF8",
                        "on-secondary-container": "#1D192B",
                        "error": "#B3261E",
                        "on-error": "#FFFFFF"
                    },
                    fontFamily: {
                        "sans": ["IBM Plex Sans", "sans-serif"],
                    },
                    boxShadow: {
                        "elevation-1": "0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3)",
                        "elevation-2": "0px 2px 6px 2px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3)",
                        "elevation-3": "0px 4px 8px 3px rgba(0, 0, 0, 0.15), 0px 1px 3px 0px rgba(0, 0, 0, 0.3)",
                    },
                    borderRadius: {
                        "card": "16px",
                        "pill": "28px"
                    }
                },
            },
        }
    </script>
<style>
        @keyframes subtle-pulse {
            0% { box-shadow: 0 0 0 0 rgba(103, 80, 164, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(103, 80, 164, 0); }
            100% { box-shadow: 0 0 0 0 rgba(103, 80, 164, 0); }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 2s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-sans antialiased text-on-surface min-h-screen flex flex-col relative selection:bg-primary selection:text-on-primary">
<header class="pt-12 px-4 pb-4 bg-surface sticky top-0 z-10">
<div class="flex items-center justify-between">
<div>
<span class="text-sm font-medium text-on-surface-variant uppercase tracking-wider">Today</span>
<h1 class="text-[24px] font-medium text-on-surface leading-tight mt-1">SUN, OCT 14</h1>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</button>
</div>
</header>
<main class="flex-1 overflow-y-auto px-4 space-y-4 pb-24">
<article class="relative w-full h-[200px] bg-surface-container rounded-card shadow-elevation-1 overflow-hidden group cursor-pointer active:scale-[0.99] transition-transform duration-200">
<div class="p-4 flex flex-col h-full justify-between relative z-10">
<div class="flex justify-between items-start">
<div>
<div class="flex items-center gap-2 mb-2">
<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-pill bg-primary text-on-primary text-xs font-medium tracking-wide shadow-sm animate-subtle-pulse">
                                LIVE
                            </span>
</div>
<h2 class="text-[32px] font-medium text-on-surface leading-tight">Morning Service</h2>
</div>
<button class="w-10 h-10 -mr-2 -mt-2 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-white/50">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<div class="flex items-end justify-between w-full">
<div class="flex items-center text-on-surface-variant gap-1 text-lg font-normal">
<span class="material-symbols-outlined text-[20px]">schedule</span>
<span>10:00 AM</span>
</div>
<div class="bg-secondary-container px-4 py-2 rounded-pill flex items-center gap-2 shadow-sm">
<span class="text-sm font-medium text-on-secondary-container">0/45 Scanned</span>
<div class="w-4 h-4 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-2 h-2 bg-primary rounded-full"></div>
</div>
</div>
</div>
</div>
</article>
<article class="relative w-full h-[200px] bg-surface-container rounded-card shadow-elevation-1 overflow-hidden group cursor-pointer active:scale-[0.99] transition-transform duration-200">
<div class="p-4 flex flex-col h-full justify-between relative z-10">
<div class="flex justify-between items-start">
<div>
<div class="h-[26px] mb-2"></div>
<h2 class="text-[32px] font-medium text-on-surface leading-tight">Youth Group</h2>
</div>
<button class="w-10 h-10 -mr-2 -mt-2 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-white/50">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<div class="flex items-end justify-between w-full">
<div class="flex items-center text-on-surface-variant gap-1 text-lg font-normal">
<span class="material-symbols-outlined text-[20px]">schedule</span>
<span>6:00 PM</span>
</div>
<div class="bg-surface px-4 py-2 rounded-pill flex items-center gap-2 border border-on-surface-variant/10">
<span class="text-sm font-medium text-on-surface-variant">0/30 Scanned</span>
</div>
</div>
</div>
</article>
</main>
<div class="fixed right-4 z-20 bottom-6">
<button class="h-[56px] w-[56px] rounded-[16px] bg-primary text-on-primary shadow-elevation-3 flex items-center justify-center hover:brightness-110 active:scale-95 transition-all duration-200 group">
<span class="material-symbols-outlined text-[24px]">add</span>
</button>
</div>

</body></html>
