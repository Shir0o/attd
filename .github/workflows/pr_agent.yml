name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  # Only let pull_request events cancel an in-flight run. issue_comment events
  # (incl. bot deploy/security comments) otherwise preempt and cancel a running
  # review, which then gets skipped by the sender.type != 'Bot' guard below.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    name: PR Agent review
    runs-on: ubuntu-latest
    # Skip bot-authored events to avoid loops
    if: ${{ github.event.sender.type != 'Bot' }}
    timeout-minutes: 10
    steps:
      - name: PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gemini-2.5-pro has no free-tier quota on the AI Studio key (every call
          # 429s with "limit: 0"), so flash is the primary; flash-lite is the
          # fallback for when flash briefly 503s under load.
          CONFIG__MODEL: "gemini/gemini-2.5-flash"
          CONFIG__FALLBACK_MODELS: '["gemini/gemini-2.5-flash-lite"]'
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "false"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "false"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "true"
