<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Event - Speed Swipe Attendance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#6750A4",
                        "on-primary": "#FFFFFF",
                        "primary-container": "#EADDFF",
                        "on-primary-container": "#21005D",
                        "surface": "#FEF7FF",
                        "on-surface": "#1D1B20",
                        "on-surface-variant": "#49454F",
                        "surface-container": "#F3EDF7",
                        "surface-container-high": "#ECE6F0",
                        "secondary-container": "#E8DEF8",
                        "on-secondary-container": "#1D192B",
                        "tertiary-container": "#FFD8E4",
                        "on-tertiary-container": "#31111D",
                        "error": "#B3261E",
                        "on-error": "#FFFFFF"
                    },
                    fontFamily: {
                        "sans": ["IBM Plex Sans", "sans-serif"],
                    },
                    boxShadow: {
                        "elevation-1": "0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3)",
                    },
                    borderRadius: {
                        "card": "16px",
                        "pill": "28px"
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(600px, 100dvh);
        }.material-input-container {
            position: relative;
        }
        .material-input-label {
            position: absolute;
            top: 8px;
            left: 16px;
            font-size: 0.75rem;
            color: #49454F;
            pointer-events: none;
        }
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-sans antialiased text-on-surface min-h-screen flex flex-col relative selection:bg-primary selection:text-on-primary">
<header class="pt-12 px-4 pb-4 bg-surface sticky top-0 z-10 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container transition-colors text-on-surface">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-[22px] font-medium text-on-surface">New Event</h1>
</div>
<button class="text-primary font-medium text-sm px-2 py-1 rounded hover:bg-surface-container transition-colors">
            Save
        </button>
</header>
<main class="flex-1 px-4 pt-4 flex flex-col h-full">
<form class="space-y-6 w-full max-w-md mx-auto flex-1 flex flex-col">
<div class="material-input-container">
<label class="sr-only" for="event-name">Event Name</label>
<div class="bg-tertiary-container rounded-t-[4px] px-4 pt-6 pb-2 border-b border-on-surface-variant relative">
<span class="material-input-label text-on-tertiary-container/70">Event Name</span>
<input class="w-full bg-transparent border-none p-0 text-base text-on-tertiary-container focus:ring-0 placeholder-transparent" id="event-name" name="event-name" placeholder="Enter event name" type="text" value=""/>
</div>
<div class="text-xs text-on-surface-variant mt-1 ml-4">Required</div>
</div>
<div class="material-input-container">
<label class="sr-only" for="event-time">Event Time</label>
<div class="bg-tertiary-container rounded-t-[4px] px-4 pt-6 pb-2 border-b border-on-surface-variant relative flex items-center justify-between">
<div class="w-full">
<span class="material-input-label text-on-tertiary-container/70">Event Time</span>
<input class="w-full bg-transparent border-none p-0 text-base text-on-tertiary-container focus:ring-0" id="event-time" name="event-time" type="time" value="10:00"/>
</div>
<span class="material-symbols-outlined text-on-tertiary-container/70 pointer-events-none">schedule</span>
</div>
</div>
<div class="material-input-container">
<label class="sr-only" for="frequency">Frequency</label>
<div class="bg-tertiary-container rounded-t-[4px] px-4 pt-6 pb-2 border-b border-on-surface-variant relative flex items-center">
<div class="w-full">
<span class="material-input-label text-on-tertiary-container/70">Frequency</span>
<select class="w-full bg-transparent border-none p-0 text-base text-on-tertiary-container focus:ring-0 pr-8" id="frequency" name="frequency">
<option value="once">One-time</option>
<option selected="" value="weekly">Weekly</option>
<option value="biweekly">Bi-weekly</option>
<option value="monthly">Monthly</option>
</select>
</div>
<span class="material-symbols-outlined text-on-tertiary-container/70 pointer-events-none absolute right-4 bottom-3">arrow_drop_down</span>
</div>
</div>
<div class="mt-4">
<div class="mb-3 text-sm font-medium text-on-surface-variant">Repeats on</div>
<div class="flex justify-between items-center px-1">
<button class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium transition-colors bg-surface-container-high text-on-surface-variant hover:bg-secondary-container" type="button">S</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium transition-colors bg-primary text-on-primary shadow-sm" type="button">M</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium transition-colors bg-surface-container-high text-on-surface-variant hover:bg-secondary-container" type="button">T</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium transition-colors bg-primary text-on-primary shadow-sm" type="button">W</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium transition-colors bg-surface-container-high text-on-surface-variant hover:bg-secondary-container" type="button">T</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium transition-colors bg-primary text-on-primary shadow-sm" type="button">F</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium transition-colors bg-surface-container-high text-on-surface-variant hover:bg-secondary-container" type="button">S</button>
</div>
</div>
<div class="flex-1"></div>
<div class="pb-8 pt-4 w-full">
<button class="w-full bg-primary text-on-primary h-[48px] rounded-full text-sm font-medium tracking-wide shadow-elevation-1 hover:brightness-110 active:scale-[0.99] transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]">add</span>
                    Create Event
                </button>
</div>
</form>
</main>
</body></html>
