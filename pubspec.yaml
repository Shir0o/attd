name: attendance_tracker
description: "A simple, privacy-focused attendance tracking application."
publish_to: 'none'
version: 1.2.2+19

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  google_sign_in: ^6.2.1
  uuid: ^4.5.1
  path_provider: ^2.1.3
  path: ^1.9.1
  intl: ^0.20.2
  googleapis: ^16.0.0
  app_attest_integrity: ^1.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  share_plus: ^13.0.0
  archive: ^4.0.9
  shared_preferences: ^2.5.4
  google_fonts: ^8.0.2
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  golden_screenshot: ^11.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/icon/foreground.png
    - cloud_version_history.webp
    - settings_signed_in.webp
    - settings_not_signed_in.webp
